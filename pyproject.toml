[project]
name = "ikvm-gateway"
version = "0.0.1"
requires-python = ">=3.12"
dependencies = [
    "websockets>=14",
    "prompt_toolkit",
]

[dependency-groups]
dev = [
    "pytest",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["spike"]
