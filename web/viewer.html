<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ikvm-gateway noVNC viewer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #1a1a1a; }
    #status { color: #ccc; font: 13px monospace; padding: 6px 10px; }
    #screen { width: 100%; height: calc(100% - 30px); }
  </style>
</head>
<body>
  <div id="status">connecting...</div>
  <div id="screen"></div>
  <script type="module">
    // Stock noVNC, loaded unmodified from a CDN. The gateway speaks standard
    // RFB 3.8 with security None over a binary WebSocket, so no noVNC changes
    // are needed. The one-time session ticket is presented via the WebSocket
    // subprotocol (Sec-WebSocket-Protocol) using noVNC's wsProtocols option.
    import RFB from "https://cdn.jsdelivr.net/npm/@novnc/novnc@1.5.0/lib/rfb.js";

    const WS_URL = "__WS_URL__";
    const TICKET = "__TICKET__";
    const status = document.getElementById("status");

    const rfb = new RFB(document.getElementById("screen"), WS_URL, {
      wsProtocols: [TICKET],
    });
    rfb.scaleViewport = true;
    rfb.focusOnClick = true;

    rfb.addEventListener("connect", () => { status.textContent = "connected"; });
    rfb.addEventListener("disconnect", (e) => {
      status.textContent = "disconnected" + (e.detail.clean ? "" : " (error)");
    });
    rfb.addEventListener("securityfailure", (e) => {
      status.textContent = "security failure: " + e.detail.reason;
    });
  </script>
</body>
</html>
